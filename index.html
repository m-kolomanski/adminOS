<!DOCTYPE html>
<html>
    <head>
        <style>
            #os {
                display: block;
                width: 99vw;
                height: 99vh;
                overflow: hidden;
            }
            #terminal-container {
                display: grid;
                grid-template-columns: 100%;
                grid-template-rows: auto 2em;
                height: 100%;

            }
            #terminal-history {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                overflow: hidden;
            }
            #terminal-input-container {
                display: grid;
                grid-template-columns: 8em auto;
            }

            p.terminal-line {
                margin: 0.25em;
            }

            .terminal-line.command {
                font-weight: bold;
            }
            .terminal-line.log {
                color: darkgrey;
            }
            .terminal-line.warning {
                color: orange;
            }
            .terminal-line.error {
                color: red;
            }
        </style>
        
    </head>
    <body>
        <div id="os"></div>

        <script src="./os/Terminal.js"></script>
        <script src="./os/System.js"></script>
    </body>
</html>
