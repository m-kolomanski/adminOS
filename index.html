<!DOCTYPE html>
<html>
    <head>
        <style>
            #os {
                display: block;
                width: 99vw;
                height: 99vh;
                overflow: hidden;
            }
            #terminal-container {
                display: grid;
                grid-template-columns: 100%;
                grid-template-rows: auto 2em;
                height: 100%;

            }
            #terminal-history {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                overflow: hidden;
            }

        </style>
        
    </head>
    <body>
        <div id="os"></div>

        <script src="./os/Terminal.js"></script>
        <script src="./os/System.js"></script>
    </body>
</html>
